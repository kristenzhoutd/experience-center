services:
  - type: web
    name: ai-suites-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: VITE_SANDBOX_API_KEY
        sync: false
      - key: VITE_GA_MEASUREMENT_ID
        sync: false
      - key: VITE_TD_WRITE_KEY
        sync: false
      - key: VITE_TD_DATABASE
        sync: false
      - key: VITE_TD_HOST
        sync: false
      - key: NODE_ENV
        value: production
